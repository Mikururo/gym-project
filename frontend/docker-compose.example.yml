# ─────────────────────────────────────────────────────────────
# Пример добавления gym-frontend в общий docker-compose.yml
# Скопируй этот сервис в docker-compose.yml бэкенда
# ─────────────────────────────────────────────────────────────
version: '3.9'

services:
  # ─── Frontend ──────────────────────────────────────────────
  gym-frontend:
    build:
      context: ./gym-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - gym-service
    networks:
      - gym-network
    restart: unless-stopped

